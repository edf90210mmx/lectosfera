<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lectósfera</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>



<body>

<div class="container mt-5">


<h1 class="mb-4">

📚 Catálogo Lectósfera

</h1>



<form method="GET"
      action="/catalogo"
      class="mb-5">



<div class="row g-3">


<div class="col-md-5">

<input

type="text"

name="q"

class="form-control"

placeholder="Buscar libro por nombre"

value="{{ busqueda }}">


</div>





<div class="col-md-3">

<select

name="genero"

class="form-select">


<option value="">

Todos los géneros

</option>


<option value="programación">

Programación

</option>


<option value="novela">

Novela

</option>


<option value="historia">

Historia

</option>


<option value="fantasía">

Fantasía

</option>


<option value="clásico">

Clásico

</option>


<option value="terror">

Terror

</option>


<option value="finanzas">

Finanzas

</option>


<option value="distopía">

Distopía

</option>


<option value="fábula">

Fábula

</option>



</select>


</div>






<div class="col-md-2">

<input


type="number"

name="precio_max"


class="form-control"


placeholder="Precio máximo"

value="{{ precio_max }}">



</div>





<div class="col-md-2">


<button

class="btn btn-primary w-100"

type="submit">


Buscar


</button>



</div>




</div>



<a href="/catalogo"

class="btn btn-secondary mt-3">


Limpiar filtros


</a>



</form>






<div class="row">


{% for libro in libros %}



<div class="col-md-4 mb-4">



<div class="card h-100 shadow-sm">



<a href="/producto/{{ libro.id }}">


<img

src="{{ libro.imagen }}"

class="card-img-top"

style="height:420px; object-fit:cover;">


</a>





<div class="card-body">


<h5 class="card-title">

{{ libro.nombre }}

</h5>



<p>

{{ libro.autor }}

</p>



<p>

<strong>Género:</strong>

{{ libro.genero }}

</p>



<p>

<strong>Stock:</strong>

{{ libro.stock }}

</p>



<h4 class="text-success">

$ {{ libro.precio }}

</h4>



<a

href="/comprar/{{ libro.id }}"

class="btn btn-success">


Comprar


</a>



</div>


</div>


</div>



{% endfor %}



</div>




</div>

</body>

</html>
