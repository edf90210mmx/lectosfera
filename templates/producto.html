<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ libro.nombre }} - Lectósfera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-5">

    <a href="/catalogo" class="btn btn-secondary mb-4">← Volver al catálogo</a>

    <div class="row">
        <div class="col-md-5">
            <img src="{{ libro.imagen }}" class="img-fluid rounded shadow">
        </div>

        <div class="col-md-7">
            <h1>{{ libro.nombre }}</h1>
            <h4 class="text-muted">{{ libro.autor }}</h4>

            <hr>

            <p><strong>Género:</strong> {{ libro.genero }}</p>
            <p><strong>Stock disponible:</strong> {{ libro.stock }}</p>

            <h3 class="text-success">$ {{ libro.precio }}</h3>

            <p class="mt-4">
                {{ libro.descripcion | default('Descripción ampliada disponible próximamente.') }}
            </p>

            <a href="/comprar/{{ libro.id }}" class="btn btn-success btn-lg">Comprar</a>
            <a href="/catalogo" class="btn btn-outline-primary btn-lg">Seguir viendo libros</a>
        </div>
    </div>

</div>
</body>
</html>
