<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Lectósfera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-5" style="max-width: 500px;">
    <h1>📝 Registro</h1>

    <form method="POST" action="/registro" class="mt-4">
        <input class="form-control mb-3" type="text" name="nombre" placeholder="Nombre completo" required>
        <input class="form-control mb-3" type="email" name="correo" placeholder="Correo electrónico" required>
        <input class="form-control mb-3" type="password" name="password" placeholder="Contraseña" required>

        <button class="btn btn-success w-100">Crear cuenta</button>
    </form>

    <a href="/login" class="btn btn-link mt-3">Ya tengo cuenta</a>
</div>
</body>
</html>
