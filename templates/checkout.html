<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Lectósfera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-5">
    <h1>🧾 Finalizar compra</h1>

    <form action="/pedido_confirmado" method="GET" class="mt-4">
        <input class="form-control mb-3" type="text" placeholder="Nombre completo" required>
        <input class="form-control mb-3" type="email" placeholder="Correo electrónico" required>
        <input class="form-control mb-3" type="text" placeholder="Dirección de entrega" required>
        <input class="form-control mb-3" type="text" placeholder="Teléfono" required>

        <button class="btn btn-success">Confirmar pedido</button>
        <a href="/carrito" class="btn btn-secondary">Volver al carrito</a>
    </form>
</div>
</body>
</html>
